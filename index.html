<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1714">
<title>Panel de Control - Estructura Ejecutiva</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <div class="gem"><div class="gem-c"></div></div>
      <div class="logo-t">
        <h1>Villahermosa 2030</h1>
        <p>Estructura Ejecutiva</p>
      </div>
    </div>
    <div class="hdr-stats" id="hdrStats"></div>
  </div>
</header>

<nav class="tabs">
  <div class="tabs-in">
    <button class="tab aall" onclick="setP('all',this)">Todos <span class="tb" id="tb-all" style="background:#222223;color:#FFFFFF;"></span></button>
    <button class="tab" onclick="setP('J',this)">⚖ Jurídico <span class="tb" id="tb-j" style="background:rgba(153,21,71,.18);color:var(--j)"></span></button>
    <button class="tab" onclick="setP('T',this)">🏗 Técnico <span class="tb" id="tb-t" style="background:rgba(196,153,85,.18);color:var(--t)"></span></button>
    <button class="tab" onclick="setP('C',this)">💼 Comercial <span class="tb" id="tb-c" style="background:rgba(153,50,80,.18);color:#b06080"></span></button>
    <button class="tab" onclick="setP('F',this)">📊 Financiero <span class="tb" id="tb-f" style="background:rgba(107,79,160,.18);color:#9b8bc0"></span></button>
  </div>
</nav>

<div class="tbar">
  <div class="tbar-in">
    <input class="srch" type="text" placeholder="Buscar actividad, responsable…" oninput="setSrch(this.value)">
    <select class="fsel" onchange="setEst(this.value)">
      <option value="">Estado: Todos</option>
      <option>Pendiente</option><option>En Proceso</option>
      <option>Revisión</option><option>Completado</option><option>Bloqueado</option>
    </select>
    <select class="fsel" onchange="setPri(this.value)">
      <option value="">Prioridad: Todas</option>
      <option>Alta</option><option>Media</option><option>Baja</option>
    </select>
    <div class="vg">
      <button class="vb act" id="btnL" onclick="setV('l')">≡ Lista</button>
      <button class="vb" id="btnG" onclick="setV('g')">▦ Gantt</button>
    </div>
  </div>
</div>

<div class="progw" id="progW">
  <div class="pl">Progreso General</div>
  <div class="pt"><div class="pf" id="pf" style="width:0%"></div></div>
  <div class="pp" id="pp">0%</div>
  <div class="pchips" id="pch"></div>
</div>

<main class="main" id="mainV"></main>

<!-- MODAL -->
<div class="mov hidden" id="mov">
  <div class="mbox">
    <div class="mhdr">
      <div class="mtitle" id="mtitle">Editar Actividad</div>
      <button class="mclose" onclick="closeM()">✕</button>
    </div>
    <div class="mf"><label>Actividad</label><input class="mi" id="m-act" type="text"></div>
    <div class="mf"><label>Subactividad</label><textarea class="mta" id="m-sub" rows="2"></textarea></div>
    <div class="m2">
      <div class="mf"><label>Responsable</label>
        <select class="ms" id="m-resp">
          <option>SAF</option><option>SAF / Patrimonio</option><option>Consejería Jurídica</option>
          <option>SOTOP</option><option>INVITAB</option><option>TURISMO</option>
          <option>SAF / SOTOP</option><option>Inversionista</option><option>Valuador Certificado</option>
          <option>Comité Interinstitucional</option><option>Comité de Licitación</option>
          <option>Notario Público</option><option>Consultor</option>
          <option>Congreso del Estado</option><option>Ayuntamientos</option>
        </select>
      </div>
      <div class="mf"><label>Estado</label>
        <select class="ms" id="m-est">
          <option>Pendiente</option><option>En Proceso</option><option>Revisión</option>
          <option>Completado</option><option>Bloqueado</option>
        </select>
      </div>
    </div>
    <div class="m2">
      <div class="mf"><label>Fecha Inicio</label><input class="mi" id="m-ini" type="date"></div>
      <div class="mf"><label>Fecha Fin</label><input class="mi" id="m-fin" type="date"></div>
    </div>
    <div class="mf"><label>Prioridad</label>
      <select class="ms" id="m-pri">
        <option>Alta</option><option>Media</option><option>Baja</option>
      </select>
    </div>
    <div class="mfoot">
      <button class="mbdel hidden" id="mbdel" onclick="delItem()">🗑 Eliminar</button>
      <button class="mbcanc" onclick="closeM()">Cancelar</button>
      <button class="mbsave" onclick="saveM()">Guardar</button>
    </div>
  </div>
</div>

/* ═══════ CONFIG ═══════ */
const PCFG={
  'Base Jurídica': {k:'J',c:'#991547',lbl:'Pilar Jurídico',ico:'⚖',ord:0},
  'Base Técnica':  {k:'T',c:'#C49955',lbl:'Pilar Técnico', ico:'🏗',ord:1},
  'Base Comercial':{k:'C',c:'#9a3558',lbl:'Pilar Comercial',ico:'💼',ord:2},
  'Base Financiera':{k:'F',c:'#6b4fa0',lbl:'Pilar Financiero',ico:'📊',ord:3},
};
const SORD=['Pendiente','En Proceso','Revisión','Completado','Bloqueado'];
const PORD=['Alta','Media','Baja'];

/* ═══════ STATE ═══════ */
let S={pilar:'all',srch:'',est:'',pri:'',view:'l',
  colP:{},colR:{},editId:null,isNew:false,
  _np:'',_nr:'',_rnum:0,_rnm:'',nextId:2000};

/* ═══════ HELPERS ═══════ */
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fd=d=>{if(!d)return'—';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y.slice(2)}`};
const smap={Pendiente:'sp','En Proceso':'se',Revisión:'sr',Completado:'sc',Bloqueado:'sb'};
const pmap={Alta:'bpa',Media:'bpm',Baja:'bpb'};
const sbdg=(s,id)=>`<span class="bs ${smap[s]||'sp'}" onclick="cycS(${id});event.stopPropagation()">${esc(s)}</span>`;
const pbdg=(p,id)=>`<span class="bp ${pmap[p]||'bpb'}" onclick="cycP(${id});event.stopPropagation()">${esc(p)}</span>`;

function getFilt(){
  return DATA.filter(d=>{
    const pk=PCFG[d.PILAR]?.k;
    if(S.pilar!=='all'&&pk!==S.pilar)return false;
    if(S.est&&d.ESTADO!==S.est)return false;
    if(S.pri&&d.PRIORIDAD!==S.pri)return false;
    if(S.srch){const t=(d.ACTIVIDAD+d.SUBACTIVIDAD+d.RESPONSABLE+d.RUBRO_NOMBRE).toLowerCase();if(!t.includes(S.srch.toLowerCase()))return false;}
    return true;
  });
}

/* ═══════ ACTIONS ═══════ */
function cycS(id){const d=DATA.find(x=>x.ID===id);if(!d)return;d.ESTADO=SORD[(SORD.indexOf(d.ESTADO)+1)%SORD.length];render()}
function cycP(id){const d=DATA.find(x=>x.ID===id);if(!d)return;d.PRIORIDAD=PORD[(PORD.indexOf(d.PRIORIDAD)+1)%PORD.length];render()}
function togP(p){S.colP[p]=!S.colP[p];render()}
function togR(k){S.colR[k]=!S.colR[k];render()}
function setP(v,btn){S.pilar=v;document.querySelectorAll('.tab').forEach(b=>b.className='tab');const m={all:'aall',J:'aj',T:'at',C:'acom',F:'afin'};btn.className='tab '+(m[v]||'aall');render()}
function setSrch(v){S.srch=v;render()}
function setEst(v){S.est=v;render()}
function setPri(v){S.pri=v;render()}
function setV(v){S.view=v;document.getElementById('btnL').classList.toggle('act',v==='l');document.getElementById('btnG').classList.toggle('act',v==='g');render()}

/* ═══════ MODAL ═══════ */
function openM(id){
  const d=DATA.find(x=>x.ID===id);if(!d)return;
  S.editId=id;S.isNew=false;
  document.getElementById('mtitle').textContent=`Editar · ${d.ACT_ID}`;
  document.getElementById('m-act').value=d.ACTIVIDAD;
  document.getElementById('m-sub').value=d.SUBACTIVIDAD;
  document.getElementById('m-resp').value=d.RESPONSABLE;
  document.getElementById('m-est').value=d.ESTADO;
  document.getElementById('m-ini').value=d.FECHA_INICIO;
  document.getElementById('m-fin').value=d.FECHA_FIN;
  document.getElementById('m-pri').value=d.PRIORIDAD;
  document.getElementById('mbdel').classList.remove('hidden');
  document.getElementById('mov').classList.remove('hidden');
}
function openNew(p,r,rn,rnm){
  S.isNew=true;S.editId=null;S._np=p;S._nr=r;S._rnum=rn;S._rnm=rnm;
  document.getElementById('mtitle').textContent='Nueva Actividad';
  ['m-act','m-sub'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-resp').value='SAF';
  document.getElementById('m-est').value='Pendiente';
  document.getElementById('m-ini').value='';
  document.getElementById('m-fin').value='';
  document.getElementById('m-pri').value='Alta';
  document.getElementById('mbdel').classList.add('hidden');
  document.getElementById('mov').classList.remove('hidden');
}
function closeM(){document.getElementById('mov').classList.add('hidden');S.editId=null}
function saveM(){
  const act=document.getElementById('m-act').value.trim();
  if(!act){alert('El campo Actividad es requerido.');return}
  if(S.isNew){
    DATA.push({ID:++S.nextId,PILAR:S._np,RUBRO_ID:S._nr,RUBRO_NUM:S._rnum,RUBRO_NOMBRE:S._rnm,
      ACT_ID:`${S._nr}-N${S.nextId}`,ACTIVIDAD:act,
      SUBACTIVIDAD:document.getElementById('m-sub').value.trim(),
      RESPONSABLE:document.getElementById('m-resp').value,
      FECHA_INICIO:document.getElementById('m-ini').value,
      FECHA_FIN:document.getElementById('m-fin').value,
      ESTADO:document.getElementById('m-est').value,
      PRIORIDAD:document.getElementById('m-pri').value});
  } else {
    const d=DATA.find(x=>x.ID===S.editId);if(!d)return;
    d.ACTIVIDAD=act;d.SUBACTIVIDAD=document.getElementById('m-sub').value.trim();
    d.RESPONSABLE=document.getElementById('m-resp').value;
    d.FECHA_INICIO=document.getElementById('m-ini').value;
    d.FECHA_FIN=document.getElementById('m-fin').value;
    d.ESTADO=document.getElementById('m-est').value;
    d.PRIORIDAD=document.getElementById('m-pri').value;
  }
  closeM();render();
}
function delItem(){if(!confirm('¿Eliminar esta actividad?'))return;DATA=DATA.filter(x=>x.ID!==S.editId);closeM();render()}
document.getElementById('mov').addEventListener('click',e=>{if(e.target===e.currentTarget)closeM()});

/* ═══════ META UPDATE ═══════ */
function updMeta(){
  const tot=DATA.length,proc=DATA.filter(d=>d.ESTADO==='En Proceso').length,
        comp=DATA.filter(d=>d.ESTADO==='Completado').length,
        pend=DATA.filter(d=>d.ESTADO==='Pendiente').length,
        bloq=DATA.filter(d=>d.ESTADO==='Bloqueado').length;
  const pct=Math.round((comp+proc*.5)/tot*100);
  document.getElementById('hdrStats').innerHTML=`
    <div class="schip"><strong>${tot}</strong> actividades</div>
    <div class="schip"><strong style="color:#e06888">${proc}</strong> en proceso</div>
    <div class="schip"><strong style="color:#62ca86">${comp}</strong> completadas</div>`;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pp').textContent=pct+'%';
  document.getElementById('tb-all').textContent=tot;
  document.getElementById('tb-j').textContent=DATA.filter(d=>d.PILAR==='Base Jurídica').length;
  document.getElementById('tb-t').textContent=DATA.filter(d=>d.PILAR==='Base Técnica').length;
  document.getElementById('tb-c').textContent=DATA.filter(d=>d.PILAR==='Base Comercial').length;
  document.getElementById('tb-f').textContent=DATA.filter(d=>d.PILAR==='Base Financiera').length;
  document.getElementById('pch').innerHTML=`
    <div class="pc">🟡 Pend. <b style="color:#d9b048">${pend}</b></div>
    <div class="pc">🔴 Proceso <b style="color:#e06888">${proc}</b></div>
    <div class="pc">✅ Comp. <b style="color:#62ca86">${comp}</b></div>
    ${bloq?`<div class="pc">🚫 Bloq. <b style="color:#dc7878">${bloq}</b></div>`:''}`;
}

/* ═══════ RENDER LISTA ═══════ */

  let h='';
  for(const pn of pord){
    const cfg=PCFG[pn];
    if(S.pilar!=='all'&&cfg.k!==S.pilar)continue;
    const items=filt.filter(d=>d.PILAR===pn);
    if(!items.length)continue;
    const col=S.colP[pn];

          const rnSafe=rb.name.replace(/'/g,"\\'");
          h+=`<div class="rsum">
            ${pn2?`<div class="smc">🟡 Pend.: <b>${pn2}</b></div>`:''}
            ${ep?`<div class="smc" style="color:#e06888">🔴 Proc.: <b>${ep}</b></div>`:''}
            ${cp?`<div class="smc" style="color:#62ca86">✅ Comp.: <b>${cp}</b></div>`:''}
            <button class="addbtn" onclick="openNew('${pn.replace(/'/g,"\\'")}','${rb.id}',${rb.num},'${rnSafe}');event.stopPropagation()">+ Agregar</button>
          </div>`;
        }
        h+='</div>';
      }
    }
    h+='</section>';
  }
  return h||'<div class="empty"><div class="ei">🔍</div>Sin resultados para los filtros aplicados.</div>';
}

/* ═══════ RENDER GANTT ═══════ */
function rGantt(filt){
  const MOS=[
    {l:'Nov 25',s:'2025-11-01'},{l:'Dic 25',s:'2025-12-01'},
    {l:'Ene 26',s:'2026-01-01'},{l:'Feb 26',s:'2026-02-01'},
    {l:'Mar 26',s:'2026-03-01'},{l:'Abr 26',s:'2026-04-01'},
    {l:'May 26',s:'2026-05-01'},{l:'Jun 26',s:'2026-06-01'},
    {l:'Jul 26',s:'2026-07-01'},{l:'Ago-Sep',s:'2026-08-01'},
    {l:'Oct-Nov',s:'2026-10-01'},{l:'Dic 26',s:'2026-12-01'},
    {l:'2027',  s:'2027-01-01'},
  ];
  const rs=new Date('2025-11-01'),re=new Date('2027-01-31');
  const pct=d=>Math.max(0,Math.min(100,(new Date(d)-rs)/(re-rs)*100));
  const mhd=MOS.map(m=>`<div class="gmo">${m.l}</div>`).join('');
  let h=`<div class="gantw"><div class="gtt">
    <div class="ghead"><div class="glhdr">Actividad</div><div class="gmonths">${mhd}</div></div>`;
  const pord=['Base Jurídica','Base Técnica','Base Comercial','Base Financiera'];
  for(const pn of pord){
    const cfg=PCFG[pn];
    if(S.pilar!=='all'&&cfg.k!==S.pilar)continue;
    const pitems=filt.filter(d=>d.PILAR===pn&&d.FECHA_INICIO&&d.FECHA_FIN);
    if(!pitems.length)continue;
    h+=`<div class="gprow"><div class="gplbl" style="color:${cfg.c}">${cfg.ico} ${cfg.lbl}</div><div class="gpline"></div></div>`;
    for(const it of pitems){
      const l=pct(it.FECHA_INICIO),r=pct(it.FECHA_FIN),w=Math.max(r-l,.3);
      h+=`<div class="grow" onclick="openM(${it.ID})" title="${it.ACT_ID}: ${it.ACTIVIDAD}\n${fd(it.FECHA_INICIO)} → ${fd(it.FECHA_FIN)}\n${it.RESPONSABLE} · ${it.ESTADO}">
        <div class="glbl"><span class="gkey" style="color:${cfg.c}">${esc(it.ACT_ID)}</span><span class="gnm">${esc(it.SUBACTIVIDAD||it.ACTIVIDAD)}</span></div>
        <div class="gbw"><div class="gbar" style="left:${l}%;width:${w}%;background:linear-gradient(90deg,${cfg.c},${cfg.c}77)"></div></div>
      </div>`;
    }
  }
  h+='</div></div>';
  return h;
}

/* ═══════ RENDER ═══════ */
function render(){
  const f=getFilt();
  document.getElementById('mainV').innerHTML=S.view==='l'?rLista(f):rGantt(f);
  updMeta();
}

render();
</script>
