<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e1b18">
<title>Panel Ejecutivo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <div class="logo">
      <div class="logo-gem"><div class="logo-gem-inner"></div></div>
      <div class="logo-text">
        <h1>Villahermosa 2030</h1>
        <p>Estructura Ejecutiva · Tres Pilares Estratégicos</p>
      </div>
    </div>
    <div class="hdr-stats" id="hdrStats"></div>
  </div>
</header>

<!-- TABS -->
<nav class="tabs">
  <div class="tabs-inner">
    <button class="tab act-all" onclick="setPilar('all',this)">
      Todos <span class="tab-badge" id="tb-all" style="background:rgba(221,201,163,.15);color:var(--c-accent)"></span>
    </button>
    <button class="tab" onclick="setPilar('Juridico',this)">
      ⚖ Jurídico <span class="tab-badge" id="tb-j" style="background:rgba(153,21,71,.2);color:var(--c-j)"></span>
    </button>
    <button class="tab" onclick="setPilar('Tecnico',this)">
      🏗 Técnico <span class="tab-badge" id="tb-t" style="background:rgba(196,153,85,.2);color:var(--c-t)"></span>
    </button>
    <button class="tab" onclick="setPilar('Financiero',this)">
      💼 Financiero <span class="tab-badge" id="tb-f" style="background:rgba(119,17,57,.2);color:#c06070"></span>
    </button>
  </div>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-inner">
    <input class="search" type="text" placeholder="Buscar actividad, responsable…" oninput="setSearch(this.value)" id="searchBox">
    <select class="sel" onchange="setEstado(this.value)">
      <option value="">Estado: Todos</option>
      <option>Pendiente</option><option>En Proceso</option>
      <option>Revisión</option><option>Completado</option><option>Bloqueado</option>
    </select>
    <select class="sel" onchange="setPrio(this.value)">
      <option value="">Prioridad: Todas</option>
      <option>Alta</option><option>Media</option><option>Baja</option>
    </select>
    <div class="view-group">
      <button class="vbtn active" id="btnLista" onclick="setView('lista')">≡ Lista</button>
      <button class="vbtn" id="btnGantt" onclick="setView('gantt')">▦ Gantt</button>
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-bar-wrap" id="progWrap">
  <div class="prog-label">Progreso General</div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-pct" id="progPct">0%</div>
  <div class="prog-chips" id="progChips"></div>
</div>

<!-- MAIN -->
<main class="main" id="mainView"></main>

<!-- MODAL -->
<div class="modal-ov hidden" id="modalOv">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title" id="mTitle">Editar Actividad</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="mf">
      <label>Actividad</label>
      <input class="m-inp" id="m-act" type="text">
    </div>
    <div class="mf">
      <label>Subactividad</label>
      <textarea class="m-ta" id="m-sub" rows="2"></textarea>
    </div>
    <div class="mf-2">
      <div class="mf">
        <label>Responsable</label>
        <select class="m-sel" id="m-resp">
          <option>SAF</option><option>SAF / Patrimonio</option>
          <option>Consejería Jurídica</option><option>SOTOP</option>
          <option>INVITAB</option><option>TURISMO</option>
          <option>SAF / SOTOP</option><option>Inversionista</option>
          <option>Valuador Certificado</option>
          <option>Comité Interinstitucional</option>
          <option>Comité de Licitación</option>
          <option>Notario Público</option><option>Consultor</option>
          <option>Congreso del Estado</option><option>Ayuntamientos</option>
        </select>
      </div>
      <div class="mf">
        <label>Estado</label>
        <select class="m-sel" id="m-est">
          <option>Pendiente</option><option>En Proceso</option>
          <option>Revisión</option><option>Completado</option><option>Bloqueado</option>
        </select>
      </div>
    </div>
    <div class="mf-2">
      <div class="mf">
        <label>Fecha Inicio</label>
        <input class="m-inp" id="m-ini" type="date">
      </div>
      <div class="mf">
        <label>Fecha Fin</label>
        <input class="m-inp" id="m-fin" type="date">
      </div>
    </div>
    <div class="mf">
      <label>Prioridad</label>
      <select class="m-sel" id="m-prio">
        <option>Alta</option><option>Media</option><option>Baja</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" id="mBtnDel" onclick="deleteItem()">🗑 Eliminar</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>

/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
const PILLARS = {
  'Base Jurídica':  {key:'Juridico', color:'#991547', label:'Pilar Jurídico',  icon:'⚖', ord:0},
  'Base Técnica':   {key:'Tecnico',  color:'#C49955', label:'Pilar Técnico',   icon:'🏗', ord:1},
  'Base Comercial': {key:'Financiero',color:'#771139', label:'Pilar Financiero',icon:'💼', ord:2},
};
const STATUS_ORDER = ['Pendiente','En Proceso','Revisión','Completado','Bloqueado'];
const PRIO_ORDER   = ['Alta','Media','Baja'];

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let state = {
  pilar: 'all', search: '', estado: '', prio: '',
  view: 'lista',
  collPillar: {}, collRubro: {},
  editId: null, isNew: false,
  nextId: 1000,
};

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtD = d => {if(!d)return'—';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y.slice(2)}`};
const sBadge = (s,id) => {
  const map = {Pendiente:'s-pend',  'En Proceso':'s-proc', Revisión:'s-rev', Completado:'s-comp', Bloqueado:'s-bloq'};
  return `<span class="badge-s ${map[s]||'s-pend'}" onclick="cycleS(${id});event.stopPropagation()">${esc(s)}</span>`;
};
const pBadge = (p,id) => {
  const map = {Alta:'p-alta',Media:'p-media',Baja:'p-baja'};
  return `<span class="badge-p ${map[p]||'p-baja'}" onclick="cycleP(${id});event.stopPropagation()">${esc(p)}</span>`;
};

function getFiltered(){
  return DATA.filter(d=>{
    const pk = PILLARS[d.PILAR]?.key;
    if(state.pilar!=='all' && pk!==state.pilar) return false;
    if(state.estado && d.ESTADO!==state.estado) return false;
    if(state.prio   && d.PRIORIDAD!==state.prio) return false;
    if(state.search){
      const txt=(d.ACTIVIDAD+d.SUBACTIVIDAD+d.RESPONSABLE+d.RUBRO_NOMBRE).toLowerCase();
      if(!txt.includes(state.search.toLowerCase())) return false;
    }
    return true;
  });
}

/* ═══════════════════════════════════════════════════
   CYCLE ACTIONS
═══════════════════════════════════════════════════ */
function cycleS(id){
  const d=DATA.find(x=>x.ID===id); if(!d)return;
  d.ESTADO=STATUS_ORDER[(STATUS_ORDER.indexOf(d.ESTADO)+1)%STATUS_ORDER.length];
  render();
}
function cycleP(id){
  const d=DATA.find(x=>x.ID===id); if(!d)return;
  d.PRIORIDAD=PRIO_ORDER[(PRIO_ORDER.indexOf(d.PRIORIDAD)+1)%PRIO_ORDER.length];
  render();
}

/* ═══════════════════════════════════════════════════
   TOGGLE COLLAPSE
═══════════════════════════════════════════════════ */
function togPillar(p){state.collPillar[p]=!state.collPillar[p];render()}
function togRubro(k){state.collRubro[k]=!state.collRubro[k];render()}

/* ═══════════════════════════════════════════════════
   FILTER ACTIONS
═══════════════════════════════════════════════════ */
function setPilar(v,btn){
  state.pilar=v;
  document.querySelectorAll('.tab').forEach(b=>b.className='tab');
  const cls={all:'act-all',Juridico:'act-j',Tecnico:'act-t',Financiero:'act-f'};
  btn.className='tab '+(cls[v]||'act-all');
  render();
}
function setSearch(v){state.search=v;render()}
function setEstado(v){state.estado=v;render()}
function setPrio(v){state.prio=v;render()}
function setView(v){
  state.view=v;
  document.getElementById('btnLista').classList.toggle('active',v==='lista');
  document.getElementById('btnGantt').classList.toggle('active',v==='gantt');
  render();
}

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
function openModal(id){
  const d=DATA.find(x=>x.ID===id); if(!d)return;
  state.editId=id; state.isNew=false;
  document.getElementById('mTitle').textContent=`Editar · ${d.ACT_ID}`;
  document.getElementById('m-act').value=d.ACTIVIDAD;
  document.getElementById('m-sub').value=d.SUBACTIVIDAD;
  document.getElementById('m-resp').value=d.RESPONSABLE;
  document.getElementById('m-est').value=d.ESTADO;
  document.getElementById('m-ini').value=d.FECHA_INICIO;
  document.getElementById('m-fin').value=d.FECHA_FIN;
  document.getElementById('m-prio').value=d.PRIORIDAD;
  document.getElementById('mBtnDel').classList.remove('hidden');
  document.getElementById('modalOv').classList.remove('hidden');
}
function openNewModal(pilar,rubro_id,rubro_num,rubro_nombre){
  state.editId=null; state.isNew=true;
  state._newPilar=pilar; state._newRubroId=rubro_id;
  state._newRubroNum=rubro_num; state._newRubroNombre=rubro_nombre;
  document.getElementById('mTitle').textContent='Nueva Actividad';
  document.getElementById('m-act').value='';
  document.getElementById('m-sub').value='';
  document.getElementById('m-resp').value='SAF';
  document.getElementById('m-est').value='Pendiente';
  document.getElementById('m-ini').value='';
  document.getElementById('m-fin').value='';
  document.getElementById('m-prio').value='Alta';
  document.getElementById('mBtnDel').classList.add('hidden');
  document.getElementById('modalOv').classList.remove('hidden');
}
function closeModal(){document.getElementById('modalOv').classList.add('hidden');state.editId=null}
function saveModal(){
  const act=document.getElementById('m-act').value.trim();
  if(!act){alert('El campo Actividad es obligatorio.');return}
  if(state.isNew){
    const newItem={
      ID:++state.nextId,
      PILAR:state._newPilar, RUBRO_ID:state._newRubroId,
      RUBRO_NUM:state._newRubroNum, RUBRO_NOMBRE:state._newRubroNombre,
      ACT_ID:`${state._newRubroId}-N${state.nextId}`,
      ACTIVIDAD:act,
      SUBACTIVIDAD:document.getElementById('m-sub').value.trim(),
      RESPONSABLE:document.getElementById('m-resp').value,
      FECHA_INICIO:document.getElementById('m-ini').value,
      FECHA_FIN:document.getElementById('m-fin').value,
      ESTADO:document.getElementById('m-est').value,
      PRIORIDAD:document.getElementById('m-prio').value,
    };
    DATA.push(newItem);
  } else {
    const d=DATA.find(x=>x.ID===state.editId); if(!d)return;
    d.ACTIVIDAD=act;
    d.SUBACTIVIDAD=document.getElementById('m-sub').value.trim();
    d.RESPONSABLE=document.getElementById('m-resp').value;
    d.FECHA_INICIO=document.getElementById('m-ini').value;
    d.FECHA_FIN=document.getElementById('m-fin').value;
    d.ESTADO=document.getElementById('m-est').value;
    d.PRIORIDAD=document.getElementById('m-prio').value;
  }
  closeModal(); render();
}
function deleteItem(){
  if(!confirm('¿Eliminar esta actividad?'))return;
  DATA=DATA.filter(x=>x.ID!==state.editId);
  closeModal(); render();
}
document.getElementById('modalOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

/* ═══════════════════════════════════════════════════
   UPDATE HEADER STATS & PROGRESS
═══════════════════════════════════════════════════ */
function updateMeta(){
  const total=DATA.length;
  const proc=DATA.filter(d=>d.ESTADO==='En Proceso').length;
  const comp=DATA.filter(d=>d.ESTADO==='Completado').length;
  const pend=DATA.filter(d=>d.ESTADO==='Pendiente').length;
  const blqd=DATA.filter(d=>d.ESTADO==='Bloqueado').length;
  const pct=Math.round((comp+proc*0.5)/total*100);
  document.getElementById('hdrStats').innerHTML=`
    <div class="stat-chip"><strong>${total}</strong> actividades</div>
    <div class="stat-chip"><strong style="color:#e06888">${proc}</strong> en proceso</div>
    <div class="stat-chip"><strong style="color:#6dce8c">${comp}</strong> completadas</div>
  `;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('tb-all').textContent=total;
  document.getElementById('tb-j').textContent=DATA.filter(d=>d.PILAR==='Base Jurídica').length;
  document.getElementById('tb-t').textContent=DATA.filter(d=>d.PILAR==='Base Técnica').length;
  document.getElementById('tb-f').textContent=DATA.filter(d=>d.PILAR==='Base Comercial').length;
  document.getElementById('progChips').innerHTML=`
    <div class="prog-chip">🟡 Pendiente <b>${pend}</b></div>
    <div class="prog-chip" style="color:#e06888">🔴 En Proceso <b>${proc}</b></div>
    <div class="prog-chip" style="color:#6dce8c">✅ Completado <b>${comp}</b></div>
    ${blqd?`<div class="prog-chip" style="color:#e08080">🚫 Bloqueado <b>${blqd}</b></div>`:''}
  `;
}

/* ═══════════════════════════════════════════════════
   RENDER LISTA
═══════════════════════════════════════════════════ */
function renderLista(filtered){
  const pillarOrder=['Base Jurídica','Base Técnica','Base Comercial'];
  let h='';
  for(const pilarName of pillarOrder){
    const cfg=PILLARS[pilarName];
    if(state.pilar!=='all' && cfg.key!==state.pilar) continue;
    const items=filtered.filter(d=>d.PILAR===pilarName);
    if(!items.length) continue;

    const collapsed=state.collPillar[pilarName];
    const rubros=[...new Map(items.map(d=>[d.RUBRO_ID,{id:d.RUBRO_ID,num:d.RUBRO_NUM,name:d.RUBRO_NOMBRE}])).values()];
    const statsH=`
      <span class="pillar-stat-chip">${items.length} activs.</span>
      ${['Pendiente','En Proceso','Completado'].map(s=>{const n=items.filter(d=>d.ESTADO===s).length;return n?`<span class="pillar-stat-chip">${s}: ${n}</span>`:''}).join('')}
    `;

    h+=`<section class="pillar" style="--pc:${cfg.color}">
      <div class="pillar-hdr" style="background:linear-gradient(135deg,${cfg.color}e8,${cfg.color}a0)" onclick="togPillar('${pilarName.replace(/'/g,"\\'")}')">
        <div class="pillar-icon">${cfg.icon}</div>
        <div class="pillar-info">
          <div class="pillar-title">${esc(cfg.label)}</div>
          <div class="pillar-sub">${esc(pilarName)} · ${items.length} actividades</div>
        </div>
        <div class="pillar-meta">${statsH}</div>
        <span class="collapse-arr ${collapsed?'':'open'}">▼</span>
      </div>`;

    if(!collapsed){
      for(const rubro of rubros){
        const rk=pilarName+'_'+rubro.id;
        const ritems=items.filter(d=>d.RUBRO_ID===rubro.id);
        const rCollapsed=state.collRubro[rk];
        h+=`<div class="rubro-grp">
          <div class="rubro-hdr" onclick="togRubro('${rk.replace(/'/g,"\\'")}')">
            <span class="rubro-num" style="color:${cfg.color}">${rubro.num}</span>
            <span class="rubro-name">${esc(rubro.name)}</span>
            <span class="rubro-cnt">${ritems.length} act.</span>
            <span class="rubro-arr ${rCollapsed?'':'open'}">▶</span>
          </div>`;

        if(!rCollapsed){
          // DESKTOP TABLE
          h+=`<div class="tbl-wrap">
            <div class="col-hdr">
              <div class="ch">ID</div><div class="ch">Clave</div>
              <div class="ch">Actividad</div><div class="ch">Subactividad</div>
              <div class="ch">Responsable</div><div class="ch">Inicio</div>
              <div class="ch">Fin</div><div class="ch">Estado</div>
              <div class="ch">Prior.</div><div class="ch"></div>
            </div>`;
          for(const it of ritems){
            h+=`<div class="act-row" onclick="openModal(${it.ID})">
              <div class="cell cell-id">${it.ID}</div>
              <div class="cell cell-key" style="color:${cfg.color}">${esc(it.ACT_ID)}</div>
              <div class="cell cell-act">${esc(it.ACTIVIDAD)}</div>
              <div class="cell cell-sub">${esc(it.SUBACTIVIDAD)||'—'}</div>
              <div class="cell cell-resp"><span>${esc(it.RESPONSABLE)}</span></div>
              <div class="cell cell-date">${fmtD(it.FECHA_INICIO)}</div>
              <div class="cell cell-date">${fmtD(it.FECHA_FIN)}</div>
              <div class="cell">${sBadge(it.ESTADO,it.ID)}</div>
              <div class="cell">${pBadge(it.PRIORIDAD,it.ID)}</div>
              <div class="cell cell-edit"><button class="edit-btn" onclick="openModal(${it.ID});event.stopPropagation()" title="Editar">✎</button></div>
            </div>`;
          }
          h+='</div>';

          // MOBILE CARDS
          h+='<div class="card-list">';
          for(const it of ritems){
            h+=`<div class="act-card" onclick="openModal(${it.ID})">
              <div class="card-top">
                <span class="card-key" style="background:${cfg.color}25;color:${cfg.color};border:1px solid ${cfg.color}40">${esc(it.ACT_ID)}</span>
                <div class="card-title">${esc(it.ACTIVIDAD)}</div>
              </div>
              ${it.SUBACTIVIDAD?`<div class="card-sub">${esc(it.SUBACTIVIDAD)}</div>`:''}
              <div class="card-row">
                <span class="card-resp">${esc(it.RESPONSABLE)}</span>
                ${it.FECHA_INICIO?`<span class="card-date"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${fmtD(it.FECHA_INICIO)} → ${fmtD(it.FECHA_FIN)}</span>`:''}
                ${sBadge(it.ESTADO,it.ID)}
                ${pBadge(it.PRIORIDAD,it.ID)}
              </div>
            </div>`;
          }
          h+='</div>';

          // SUMMARY + ADD
          const pnd=ritems.filter(d=>d.ESTADO==='Pendiente').length;
          const prc=ritems.filter(d=>d.ESTADO==='En Proceso').length;
          const cmp=ritems.filter(d=>d.ESTADO==='Completado').length;
          h+=`<div class="rubro-summary">
            ${pnd?`<div class="sum-chip">🟡 Pendiente: <b>${pnd}</b></div>`:''}
            ${prc?`<div class="sum-chip" style="color:#e06888">🔴 En Proceso: <b>${prc}</b></div>`:''}
            ${cmp?`<div class="sum-chip" style="color:#6dce8c">✅ Completado: <b>${cmp}</b></div>`:''}
            <button class="add-btn" onclick="openNewModal('${pilarName.replace(/'/g,"\\'")}','${rubro.id}',${rubro.num},'${rubro.name.replace(/'/g,"\\'")}');event.stopPropagation()">+ Agregar actividad</button>
          </div>`;
        }
        h+='</div>';
      }
    }
    h+='</section>';
  }
  if(!h) h=`<div class="empty-state"><div class="icon">🔍</div><div>Sin resultados para los filtros aplicados.</div></div>`;
  return h;
}

    {l:'Mar 26',s:'2026-03-01',e:'2026-03-31'},
    {l:'Abr 26',s:'2026-04-01',e:'2026-04-30'},
    {l:'May 26',s:'2026-05-01',e:'2026-05-31'},
    {l:'Jun 26',s:'2026-06-01',e:'2026-06-30'},
    {l:'Jul 26',s:'2026-07-01',e:'2026-07-31'},
    {l:'Ago-Oct',s:'2026-08-01',e:'2026-10-31'},
    {l:'Nov-Dic',s:'2026-11-01',e:'2026-12-31'},
  ];
  const rStart=new Date('2025-11-01'), rEnd=new Date('2026-12-31');
  const rMs=rEnd-rStart;
  const pct=d=>Math.max(0,Math.min(100,(new Date(d)-rStart)/rMs*100));
  const monthsH=MONTHS.map(m=>`<div class="gantt-month-hdr">${m.l}</div>`).join('');

  let h=`<div class="gantt-wrap"><div class="gantt-table">
    <div class="gantt-thead">
      <div class="gantt-lbl-hdr">Actividad</div>
      <div class="gantt-months">${monthsH}</div>
    </div>`;

  const pillarOrder=['Base Jurídica','Base Técnica','Base Comercial'];
  for(const pn of pillarOrder){
    const cfg=PILLARS[pn];
    if(state.pilar!=='all' && cfg.key!==state.pilar) continue;
    const pitems=filtered.filter(d=>d.PILAR===pn&&d.FECHA_INICIO&&d.FECHA_FIN);
    if(!pitems.length) continue;

    h+=`<div class="gantt-pilar-row">
      <div class="gantt-pilar-lbl" style="color:${cfg.color}">${cfg.icon} <span>${cfg.label}</span></div>
      <div class="gantt-pilar-timeline"></div>
    </div>`;

    for(const it of pitems){
      const left=pct(it.FECHA_INICIO);
      const right=pct(it.FECHA_FIN);
      const width=Math.max(right-left,0.4);
      h+=`<div class="gantt-row" onclick="openModal(${it.ID})" title="${it.ACT_ID}: ${it.ACTIVIDAD}\n${fmtD(it.FECHA_INICIO)} → ${fmtD(it.FECHA_FIN)} · ${it.RESPONSABLE}">
        <div class="gantt-row-lbl">
          <span class="gantt-row-key" style="color:${cfg.color}">${esc(it.ACT_ID)}</span>
          <span class="gantt-row-name">${esc(it.SUBACTIVIDAD||it.ACTIVIDAD)}</span>
        </div>
        <div class="gantt-bar-wrap">
          <div class="gantt-bar" style="left:${left}%;width:${width}%;background:linear-gradient(90deg,${cfg.color},${cfg.color}88)"
            title="${esc(it.ACT_ID)}: ${fmtD(it.FECHA_INICIO)} → ${fmtD(it.FECHA_FIN)}"></div>
        </div>
      </div>`;
    }
  }
  h+='</div></div>';
  return h;
}

/* ═══════════════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════════════ */
function render(){
  const f=getFiltered();
  const el=document.getElementById('mainView');
  el.innerHTML=state.view==='lista'?renderLista(f):renderGantt(f);
  updateMeta();
}

render();
</script>
</body>
</html>
